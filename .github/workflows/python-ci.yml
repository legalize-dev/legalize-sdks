name: python-ci

on:
  push:
    branches: [main]
    paths:
      - "python/**"
      - "openapi-sdk.json"
      - ".github/workflows/python-ci.yml"
  pull_request:
    paths:
      - "python/**"
      - "openapi-sdk.json"
      - ".github/workflows/python-ci.yml"
  workflow_dispatch:

concurrency:
  group: python-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: python

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .
      - name: mypy --strict
        run: mypy --strict src

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: pytest
        run: pytest --cov=legalize --cov-report=xml --cov-report=term
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: python/coverage.xml

  wheel:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheel
        run: |
          pip install build
          python -m build
      - name: Smoke-test installed wheel
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/legalize-*.whl
          /tmp/smoke/bin/python -c "
          import legalize
          assert legalize.__version__
          assert legalize.Legalize
          assert legalize.AsyncLegalize
          assert legalize.Webhook
          print('wheel smoke test OK')
          "
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: python/dist/
