name: python-integration

on:
  schedule:
    - cron: "0 5 * * *"  # daily at 05:00 UTC
  workflow_dispatch:

concurrency:
  group: python-integration
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    if: github.repository == 'legalize-dev/legalize-sdks'
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run integration tests against prod (read-only)
        env:
          LEGALIZE_API_KEY: ${{ secrets.LEGALIZE_API_KEY }}
          LEGALIZE_BASE_URL: https://legalize.dev
        run: pytest tests/integration -v --tb=short
      - name: Run webhook end-to-end tests (opt-in, auto-skip if server broken)
        env:
          LEGALIZE_API_KEY: ${{ secrets.LEGALIZE_API_KEY }}
          LEGALIZE_BASE_URL: https://legalize.dev
        run: pytest tests/integration_webhooks -v --tb=short
