name: python-publish

on:
  push:
    tags: ["python-v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/legalize
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify tag matches pyproject version
        if: github.event_name == 'push'
        run: |
          VERSION=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          TAG=${GITHUB_REF_NAME#python-v}
          if [ "$VERSION" != "$TAG" ]; then
            echo "Tag $TAG does not match pyproject version $VERSION"
            exit 1
          fi
      - name: Build
        run: |
          pip install build
          python -m build
      # Uses a PyPI API token for the first release. Once the project
      # exists on PyPI, migrate to Trusted Publishing:
      #   1. pypi.org/manage/project/legalize/settings/publishing/
      #      → Add a new trusted publisher (GitHub Actions)
      #      → repo: legalize-dev/legalize-sdks, workflow: python-publish.yml,
      #        environment: pypi
      #   2. Replace the `password:` line below with `id-token: write` at
      #      the job level and drop the `password:` arg here.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
