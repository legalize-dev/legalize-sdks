name: openapi-sync

on:
  schedule:
    - cron: "0 6 * * *"  # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch + filter spec
        run: |
          ./scripts/fetch_openapi.sh
          python scripts/filter_openapi.py
      - name: Regenerate models
        run: |
          pip install -e "python[dev]"
          ./scripts/gen_models.sh
      - name: Run tests
        working-directory: python
        run: pytest -q
      - name: Open PR if spec changed
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.1.0
        with:
          commit-message: "chore: sync OpenAPI spec from prod"
          title: "chore: sync OpenAPI spec from prod"
          body: |
            Automated daily sync from https://legalize.dev/openapi.json.

            The filter + model-gen pipeline has run and tests pass. Review the
            diff for any unexpected schema changes.
          branch: auto/openapi-sync
          delete-branch: true
