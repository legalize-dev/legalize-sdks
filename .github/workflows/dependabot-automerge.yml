name: dependabot-automerge

# Auto-approves and queues auto-merge on Dependabot PRs that are
# minor-version or patch-version bumps. Major bumps are left open for
# manual review.
#
# Auto-merge fires only after branch protection is satisfied:
#   - required status checks pass (codeql + branch up to date)
#   - no unresolved review threads
#   - linear history respected (squash merge)
#
# If any language-specific CI (python-ci / node-ci / go-ci) triggered
# on the PR and fails, `gh pr merge --auto` will NOT merge — GitHub
# blocks the merge queue on any failing check associated with the PR,
# even ones that aren't named as "required".

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  automerge:
    name: Auto-merge Dependabot minor/patch
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@08eff52bf64351f401fb50d4972fa95b9f2c2d1b # v2.4.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Approve PR
        if: steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable auto-merge
        if: steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
