name: node-ci

# Dormant until the Node SDK lands in `node/`. Once `node/package.json`
# exists, the path filter wakes this workflow up automatically.

on:
  push:
    branches: [main]
    paths:
      - "node/**"
      - "openapi-sdk.json"
      - ".github/workflows/node-ci.yml"
  pull_request:
    paths:
      - "node/**"
      - "openapi-sdk.json"
      - ".github/workflows/node-ci.yml"
  workflow_dispatch:

concurrency:
  group: node-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: node

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: node/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: node/package-lock.json
      - run: npm ci
      - run: npm test

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: node/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Smoke-test tarball
        run: |
          npm pack
          TARBALL=$(ls legalize-dev-sdk-*.tgz)
          mkdir /tmp/smoke && cd /tmp/smoke
          npm init -y >/dev/null
          npm install "$GITHUB_WORKSPACE/node/$TARBALL"
          node -e "const { Legalize } = require('@legalize-dev/sdk'); if (!Legalize) process.exit(1);"
      - uses: actions/upload-artifact@v4
        with:
          name: node-pack
          path: node/legalize-dev-sdk-*.tgz
