run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - gosec
    - gofumpt

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: false
      - name: package-comments
        disabled: false
  gosec:
    excludes:
      - G404 # jitter uses math/rand intentionally (not crypto)
